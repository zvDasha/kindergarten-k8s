services:
  mongodb:
    image: mongo:6.0
    container_name: kindergarten_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: kindergarten_backend
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/kindergarten
      # Змінено на 127.0.0.1 для стабільності з'єднання
      - FRONTEND_URL=http://127.0.0.1:8080
      # Додано JWT_SECRET, щоб авторизація не видавала помилку 403
      - JWT_SECRET=supersecret123
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: kindergarten_frontend
    ports:
      - "8080:80"
    environment:
      # Змінено на 127.0.0.1, щоб браузер не конфліктував з localhost
      - VITE_BACKEND_URL=http://127.0.0.1:3000
    depends_on:
      - backend

volumes:
  mongo_data:
