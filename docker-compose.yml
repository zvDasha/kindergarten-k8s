services:
  mongodb:
    image: mongo:6.0
    container_name: kindergarten_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: kindergarten_backend
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/kindergarten
      - FRONTEND_URL=http://localhost:8080
      - AUTH0_DOMAIN=dev-s75g8np76uar4fon.us.auth0.com
      - AUTH0_AUDIENCE=https://kindergarten-api
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: kindergarten_frontend
    ports:
      - "8080:80"
    environment:
      - VITE_BACKEND_URL=http://127.0.0.1:3000
      - VITE_AUTH0_DOMAIN=${AUTH0_DOMAIN}
      - VITE_AUTH0_CLIENT_ID=${AUTH0_CLIENT_ID}
      - VITE_AUTH0_AUDIENCE=${AUTH0_AUDIENCE}
    depends_on:
      - backend

volumes:
  mongo_data:
