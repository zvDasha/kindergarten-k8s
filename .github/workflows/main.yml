name: CI/CD – Build, Push and Deploy

on: [push]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Downcase repository owner
        run: echo "OWNER_LC=${OWNER,,}" >> $GITHUB_ENV
        env:
          OWNER: "${{ github.repository_owner }}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker images
        run: |
          docker build -t ghcr.io/${{ env.OWNER_LC }}/kindergarten-backend:latest ./backend
          docker build -t ghcr.io/${{ env.OWNER_LC }}/kindergarten-frontend:latest ./frontend
          docker push ghcr.io/${{ env.OWNER_LC }}/kindergarten-backend:latest
          docker push ghcr.io/${{ env.OWNER_LC }}/kindergarten-frontend:latest

      - name: Start minikube
        uses: medyagh/setup-minikube@latest

      - name: Enable ingress addon
        run: minikube addons enable ingress

      - name: Wait for Ingress controller to be ready
        run: |
          kubectl wait --namespace ingress-nginx \
            --for=condition=ready pod \
            --selector=app.kubernetes.io/component=controller \
            --timeout=90s
          kubectl delete validatingwebhookconfiguration ingress-nginx-admission --ignore-not-found

      - name: Set image names in manifests
        run: |
          sed -i "s/YOUR_GITHUB_USERNAME/${{ env.OWNER_LC }}/g" k8s/backend.yaml k8s/frontend.yaml

      - name: Create namespace
        run: kubectl apply -f k8s/namespace.yaml

      - name: Deploy to Kubernetes
        run: kubectl apply -f k8s/

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend -n kindergarten --timeout=120s
          kubectl rollout status deployment/frontend -n kindergarten --timeout=180s

      - name: Show deployed resources
        run: kubectl get pods,svc,ingress,pvc -n kindergarten -o wide
